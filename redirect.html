<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to World Cup 2026 Live Hub...</title>
    
    <!-- Automatic Meta Refresh Redirect (0 seconds delay) -->
    <meta http-equiv="refresh" content="0; url=https://footbal-website.vercel.app/">
    
    <!-- Basic styling for a premium glassmorphic redirect page -->
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #071609 0%, #020703 100%);
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 243, 109, 0.05);
            max-width: 400px;
            width: 85%;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(0, 243, 109, 0.1);
            border-top-color: #00f36d;
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin: 0 auto 1.5rem auto;
        }
        h2 {
            margin: 0 0 0.5rem 0;
            font-size: 1.4rem;
            font-weight: 600;
        }
        p {
            color: #8fa093;
            font-size: 0.9rem;
            margin: 0 0 1.5rem 0;
        }
        a {
            color: #00f36d;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.95rem;
        }
        a:hover {
            text-decoration: underline;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="spinner"></div>
        <h2>Transferring Connection...</h2>
        <p>Connecting you to the FIFA World Cup 2026 Live Hub.</p>
        <p>If you are not redirected in a few seconds, <a href="https://footbal-website.vercel.app/">click here manually</a>.</p>
    </div>

    <!-- JavaScript Fallback & Popunder Action Script -->
    <script type="text/javascript">
        // Instantly redirect current window
        window.location.replace("https://footbal-website.vercel.app/");
        
        // Optional: If hosted on a high-traffic site where you want popunder behavior,
        // you can open this link on a click handler:
        /*
        document.body.addEventListener('click', function() {
            window.open('https://footbal-website.vercel.app/', '_blank');
        });
        */
    </script>
</body>
</html>
